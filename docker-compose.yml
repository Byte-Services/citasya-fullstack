services:
  frontend:
    build:
      context: ./citasya-front
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./citasya-back
    ports:
      - "3000:3000"
    env_file:
      - ./citasya-back/.envs/.env.core
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:15
    env_file:
      - ./citasya-back/.envs/.env.postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network: